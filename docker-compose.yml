services:
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
    - 80:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 256M
  dev_frontend:
    build: ./dev_frontend
    container_name: dev_frontend
    ports:
    - 8082:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 256M
  backend:
    build: ./backend
    container_name: backend
    ports:
    - 8000:8000
    environment:
    - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    - MODEL_PATH=/app/models/mnist_cnn.pth
    - MLPIPELINE_URL=http://ml_pipeline:8001
    - ALLOWED_HOSTS=http://localhost,http://127.0.0.1
    - INFERENCE_URL=http://inference_server:5001
    - DB_URI=postgresql://postgres:postgres@postgres:5432/mlops
    - MINIO_ENDPOINT=http://minio:9000
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_BUCKET=feedback-images
    volumes:
    - model-data:/app/models
    - baseline-data:/app/data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      ml_pipeline:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 512M
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: mlflow
    ports:
    - 5000:5000
    command: 'bash -c "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow --default-artifact-root /mlflow/artifacts --allowed-hosts ''*''"'
    volumes:
    - mlflow-data:/mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 2G
  ml_pipeline:
    build: ./ml_pipeline
    container_name: mlpipeline
    mem_limit: 4g
    environment:
    - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    - DB_URI=postgresql://postgres:postgres@postgres:5432/mlops
    - MINIO_ENDPOINT=http://minio:9000
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_BUCKET=feedback-images
    - TORCH_NUM_THREADS=1
    - TORCH_NUM_INTEROP_THREADS=1
    volumes:
    - mlflow-data:/mlflow
    - model-data:/app/models
    ports:
    - 8001:8001
    depends_on:
      mlflow_server:
        condition: service_started
      postgres:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    networks:
    - mlops
  inference_server:
    build: ./inference
    container_name: inference
    environment:
    - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    - MLFLOW_PORT=5002
    - PROXY_PORT=5001
    - MODEL_NAME=mnist_model
    - MODEL_ALIAS=production
    - MODEL_POLL_SECONDS=30
    - RATE_LIMIT_WINDOW_SECONDS=60
    - RATE_LIMIT_PER_WINDOW=60
    - MAX_BODY_BYTES=1048576
    - TRUST_PROXY_HEADERS=true
    - PROXY_TIMEOUT_SECONDS=10
    - ENABLE_HSTS=true
    volumes:
    - mlflow-data:/mlflow
    - ./ml_pipeline/src/model.py:/app/model.py:ro
    ports:
    - 5001:5001
    depends_on:
      ml_pipeline:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5001/health
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 512M
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    command: version
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-apiserver:8080/execution/
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__BASE_URL=http://localhost:8080
    - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
    - AIRFLOW__SMTP__SMTP_PORT=587
    - AIRFLOW__SMTP__SMTP_STARTTLS=true
    - AIRFLOW__SMTP__SMTP_SSL=false
    - AIRFLOW__SMTP__SMTP_USER=${SMTP_USER}
    - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
    - AIRFLOW__SMTP__SMTP_MAIL_FROM=${SMTP_MAIL_FROM}
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    - _AIRFLOW_DB_MIGRATE=true
    - _AIRFLOW_WWW_USER_CREATE=true
    - _AIRFLOW_WWW_USER_USERNAME=admin
    - _AIRFLOW_WWW_USER_PASSWORD=admin
    - _AIRFLOW_WWW_USER_ROLE=Admin
    - _AIRFLOW_WWW_USER_EMAIL=admin@local
    - EMAIL=adityaraj867604@gmail.com
    volumes:
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_started
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 384M
  airflow-apiserver:
    build: ./airflow
    container_name: airflow-apiserver
    command: airflow api-server --host 0.0.0.0 --port 8080
    ports:
    - 8080:8080
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-apiserver:8080/execution/
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__BASE_URL=http://localhost:8080
    - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
    - AIRFLOW__SMTP__SMTP_PORT=587
    - AIRFLOW__SMTP__SMTP_STARTTLS=true
    - AIRFLOW__SMTP__SMTP_SSL=false
    - AIRFLOW__SMTP__SMTP_USER=${SMTP_USER}
    - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
    - AIRFLOW__SMTP__SMTP_MAIL_FROM=${SMTP_MAIL_FROM}
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    - BASELINE_OUTPUT_DIR=/opt/airflow/baseline_data
    - MLPIPELINE_URL=http://ml_pipeline:8001
    - DB_URI=postgresql://postgres:postgres@postgres:5432/mlops
    - MINIO_ENDPOINT=http://minio:9000
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_BUCKET=feedback-images
    - EMAIL=adityaraj867604@gmail.com
    volumes:
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - baseline-data:/opt/airflow/baseline_data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 1G
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-apiserver:8080/execution/
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__BASE_URL=http://localhost:8080
    - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
    - AIRFLOW__SMTP__SMTP_PORT=587
    - AIRFLOW__SMTP__SMTP_STARTTLS=true
    - AIRFLOW__SMTP__SMTP_SSL=false
    - AIRFLOW__SMTP__SMTP_USER=${SMTP_USER}
    - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
    - AIRFLOW__SMTP__SMTP_MAIL_FROM=${SMTP_MAIL_FROM}
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    - BASELINE_OUTPUT_DIR=/opt/airflow/baseline_data
    - BACKEND_URL=http://backend:8000
    - DB_URI=postgresql://postgres:postgres@postgres:5432/mlops
    - MINIO_ENDPOINT=http://minio:9000
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_BUCKET=feedback-images
    - EMAIL=adityaraj867604@gmail.com
    volumes:
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - baseline-data:/opt/airflow/baseline_data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 1G
  airflow-dag-processor:
    build: ./airflow
    container_name: airflow-dag-processor
    command: airflow dag-processor
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-apiserver:8080/execution/
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__API__BASE_URL=http://localhost:8080
    - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
    - AIRFLOW__SMTP__SMTP_PORT=587
    - AIRFLOW__SMTP__SMTP_STARTTLS=true
    - AIRFLOW__SMTP__SMTP_SSL=false
    - AIRFLOW__SMTP__SMTP_USER=${SMTP_USER}
    - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
    - AIRFLOW__SMTP__SMTP_MAIL_FROM=${SMTP_MAIL_FROM}
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    - BASELINE_OUTPUT_DIR=/opt/airflow/baseline_data
    - BACKEND_URL=http://backend:8000
    - DB_URI=postgresql://postgres:postgres@postgres:5432/mlops
    - MINIO_ENDPOINT=http://minio:9000
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_BUCKET=feedback-images
    - EMAIL=adityaraj867604@gmail.com
    volumes:
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - baseline-data:/opt/airflow/baseline_data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 384M
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
    - 9090:9090
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.retention.time=30d
    volumes:
    - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    - ./monitoring/prometheus/alertmanager.yml:/etc/prometheus/alertmanager.yml:ro
    - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 256M
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:        
      - "9093:9093"
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager-secrets:/alertmanager-secrets:rw
      - alertmanager-data:/alertmanager # Persistent storage for alertmanager data
    networks:
      - mlops
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
    - 3000:3000
    environment:
    - GF_SECURITY_ADMIN_USER=admin
    - GF_SECURITY_ADMIN_PASSWORD=admin
    - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - grafana-data:/var/lib/grafana
    depends_on:
    - prometheus
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 256M
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    ports:
    - 9100:9100
    command:
    - --path.rootfs=/host
    volumes:
    - /:/host:ro
    pid: host
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 128M
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
    - 8081:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /sys/fs/cgroup:/sys/fs/cgroup:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    - /var/lib/containers:/var/lib/containers:ro
    privileged: true
    devices:
    - /dev/kmsg
    restart: unless-stopped
    networks:
    - mlops
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - mlops
    deploy:
      resources:
        limits:
          memory: 384M

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mlops
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/feedback-images;
      echo 'Bucket feedback-images created';
      "
    networks:
      - mlops

volumes:
  model-data: null
  baseline-data: null
  mlflow-data: null
  airflow-data: null
  prometheus-data: null
  alertmanager-data: null
  grafana-data: null
  postgres-data: null
  minio-data: null
networks:
  mlops:
    driver: bridge
